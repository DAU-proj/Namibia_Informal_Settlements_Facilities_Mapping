<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>UN-HABITAT | Namibia Informal Settlements Facilities Mapping</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img src="./asset/unhabitat_logo.png" class="brand-logo">
      <div>
        <div class="brand-name">UN-HABITAT</div>
        <div class="brand-subtitle">Urban Data & Analytics Unit</div>
      </div>
    </div>
  </div>
</header>

<!-- TITLE -->
<section class="hero">
  <div class="hero-inner">
    <h1>Namibia Informal Settlements Facilities Mapping</h1>
    <p>Spatial analytics dashboard for facility condition monitoring</p>
  </div>
</section>

<!-- MAIN -->
<main class="page">

<aside class="sidebar">

  <!-- FILTERS -->
  <div class="panel">
    <h3>Filters</h3>

    <label>Facility Type</label>
    <select id="facilityFilter" class="dropdown">
      <option value="">All</option>
    </select>

    <label>Condition</label>
    <select id="conditionFilter" class="dropdown">
      <option value="">All</option>
    </select>

    <label>Town</label>
    <select id="townSelect" class="dropdown">
      <option value="">-- Select Town --</option>
    </select>
  </div>

  <!-- KPI -->
  <div class="panel">
    <h3>KPI</h3>
    <div id="kpi">Select a town</div>
  </div>

  <!-- CHARTS -->
  <div class="panel">
    <h3>Analytics</h3>
    <canvas id="conditionChart" height="130"></canvas>
    <canvas id="facilityChart" height="130"></canvas>
  </div>

  <!-- LEGEND -->
  <div class="panel">
    <h3>Legend</h3>

    <div class="legend-item"><span class="dot green"></span> Good</div>
    <div class="legend-item"><span class="dot yellow"></span> Fair</div>
    <div class="legend-item"><span class="dot red"></span> Poor</div>
    <div class="legend-item"><span class="dot grey"></span> Unknown</div>

    <hr>

    <div class="legend-item"><i class="fa fa-school"></i> School</div>
    <div class="legend-item"><i class="fa fa-hospital"></i> Health</div>
    <div class="legend-item"><i class="fa fa-droplet"></i> Water</div>
    <div class="legend-item"><i class="fa fa-toilet"></i> Sanitation</div>

  </div>

</aside>

<section class="map-section">
  <div id="map"></div>
</section>

</main>

<script src="js/app.js"></script>

</body>
</html>
