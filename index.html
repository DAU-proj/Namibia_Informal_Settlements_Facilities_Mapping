<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UN-HABITAT | Namibia Informal Settlements Facilities Mapping</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <img src="./asset/unhabitat_logo.png" alt="UN-Habitat logo" class="brand-logo">
        <div class="brand-text">
          <div class="brand-name">UN-HABITAT</div>
          <div class="brand-subtitle">Data and Analytics Dashboard</div>
        </div>
      </div>

      <nav class="topnav">
        <a href="#" class="topnav-link active">Dashboard</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <h1>Namibia Informal Settlements Facilities Mapping</h1>
      <p>An overview of facilities, conditions, and settlement-level spatial analytics.</p>
    </div>
  </section>

  <main class="page">
    <aside class="sidebar">
      <div class="panel">
        <h3>Search</h3>
        <input type="text" id="searchBox" placeholder="Search town...">
      </div>

      <div class="panel">
        <h3>Towns</h3>
        <div id="townList" class="town-list"></div>
      </div>

      <div class="panel">
        <h3>KPI Analytics</h3>
        <div id="kpi" class="kpi-wrap">Click a town to view statistics.</div>
      </div>

      <div class="panel">
        <h3>Legend</h3>
        <div class="legend-item">
          <span class="legend-dot facility-dot"></span>
          <span>Facilities</span>
        </div>
        <div class="legend-item">
          <span class="legend-swatch settlement-swatch"></span>
          <span>Settlements</span>
        </div>
        <div class="legend-item">
          <span class="legend-cluster">12</span>
          <span>Clustered facilities</span>
        </div>
      </div>
    </aside>

    <section class="map-section">
      <div id="map"></div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
